# Example configuration for Codex CLI proxy setup

server:
  port: 8080
  host: "127.0.0.1"  # Only listen on localhost for security
  read_timeout: 60
  write_timeout: 60

proxy:
  target_url: "https://api.openai.com"
  timeout: 60
  skip_tls_verify: false
  headers:
    User-Agent: "Codex-Proxy-Parser/1.0"
    # Add any additional headers needed for authentication

parser:
  enabled: true
  parse_genai: true
  parse_vibe_coding: true
  max_body_size: 52428800  # 50MB for large code files
  keywords:
    - "openai"
    - "anthropic"
    - "claude"
    - "gpt"
    - "codex"
    - "cursor"
    - "github"
    - "copilot"
    - "tabnine"
    - "kite"
    - "intellicode"

logging:
  level: "debug"
  format: "json"
  file: "/var/log/codex-proxy.log"

output:
  format: "json"
  file: "/var/log/codex-traffic.json"
  console: true
  max_entries: 10000