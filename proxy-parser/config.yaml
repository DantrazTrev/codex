# Codex Proxy Parser Configuration

server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: 30
  write_timeout: 30

proxy:
  target_url: "https://api.openai.com"
  timeout: 30
  skip_tls_verify: false
  headers:
    User-Agent: "Codex-Proxy-Parser/1.0"

parser:
  enabled: true
  parse_genai: true
  parse_vibe_coding: true
  max_body_size: 10485760  # 10MB
  keywords:
    - "openai"
    - "anthropic"
    - "claude"
    - "gpt"
    - "codex"
    - "cursor"
    - "github"
    - "copilot"

logging:
  level: "info"
  format: "json"
  file: ""

output:
  format: "json"
  file: "traffic.log"
  console: true
  max_entries: 1000